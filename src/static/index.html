<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 多模态直播 API 客户端</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <div class="settings">
            <input type="password" id="api-key" placeholder="Please Input Gemini API Key" />
            <button id="config-toggle" class="material-symbols-outlined">设置</button>
        </div>
        <div id="config-container" class="hidden-mobile">
            <div class="config-wrapper">
                <div class="setting-container">
                    <span class="setting-label">语言: </span>
                    <select id="language-select">
                    </select>
                </div>
                <div class="setting-container">
                    <span class="setting-label">声音: </span>
                    <select id="voice-select">
                        <option value="Puck">冰晶 (男)</option>
                        <option value="Charon">卡隆 (男)</option>
                        <option value="Fenrir">芬里尔 (男)</option>
                        <option value="Kore">科瑞 (女)</option>
                        <option value="Aoede" selected>奥菲德 (女)</option>
                    </select>
                </div>
                <div class="setting-container">
                    <span class="setting-label">响应类型: </span>
                    <select id="response-type-select">
                        <option value="text">文本</option>
                        <option value="audio" selected>音频</option>
                    </select>
                </div>
                <div class="setting-container">
                    <span class="setting-label">视频帧率: </span>
                    <input type="number" id="fps-input" placeholder="Video FPS" value="1" min="1" max="30" step="1"/>
                    <span class="fps-help">更高的帧率需要更多的网络带宽</span>
                </div>
                <textarea id="system-instruction" placeholder="输入自定义系统指令..." rows="6"></textarea>
                <button id="apply-config">确认</button>
            </div>
        </div>
        <button id="connect-button">连接</button>
        <div id="logs-container"></div>
        <input type="text" id="message-input" placeholder="输入信息...">
        <button id="send-button">发送</button>
        <button id="mic-button">
            <span id="mic-icon" class="material-symbols-outlined">麦克风</span>
        </button>
        <button id="camera-button">
            <span id="camera-icon" class="material-symbols-outlined">摄像机</span>
        </button>
        <button id="screen-button">
            <span id="screen-icon" class="material-symbols-outlined">屏幕共享</span>
        </button>
        <div class="audio-visualizers">
            <div class="visualizer-container">
                <label>输入音频</label>
                <div id="input-audio-visualizer"></div>
            </div>
            <div class="visualizer-container">
                <label>输出音频</label>
                <div id="audio-visualizer"></div>
            </div>
        </div>
        <div id="video-container" style="display: none;">
            <video id="preview" playsinline autoplay muted></video>
            <div class="video-controls">
                <button id="stop-video">停止视频</button>
                <button id="flip-camera">
                    <span class="material-symbols-outlined">翻转摄像头</span>
                </button>
            </div>
        </div>
        <div id="screen-container" style="display: none;">
            <video id="screen-preview" playsinline autoplay muted></video>
            <button class="close-button material-symbols-outlined">关闭</button>
        </div>
    </div>
    <script src="js/main.js" type="module"></script>
</body>
</html>
